<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="labelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e07070"/>
      <stop offset="1" stop-color="#e5a04a"/>
    </linearGradient>
    <style>
      .vinyl-disc { animation: spin 8s linear infinite; transform-origin: 16px 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </defs>

  <!-- Outer disc with grooves -->
  <circle class="vinyl-disc" cx="16" cy="16" r="15" fill="#1a1a24"/>

  <!-- Groove lines -->
  <circle class="vinyl-disc" cx="16" cy="16" r="13.5" fill="none" stroke="#2a2a34" stroke-width="0.4"/>
  <circle class="vinyl-disc" cx="16" cy="16" r="12" fill="none" stroke="#2a2a34" stroke-width="0.4"/>
  <circle class="vinyl-disc" cx="16" cy="16" r="10.5" fill="none" stroke="#2a2a34" stroke-width="0.4"/>
  <circle class="vinyl-disc" cx="16" cy="16" r="9" fill="none" stroke="#2a2a34" stroke-width="0.4"/>
  <circle class="vinyl-disc" cx="16" cy="16" r="7.5" fill="none" stroke="#2a2a34" stroke-width="0.4"/>

  <!-- Center label -->
  <circle class="vinyl-disc" cx="16" cy="16" r="6" fill="url(#labelGradient)"/>

  <!-- DCB text on label -->
  <text class="vinyl-disc" x="16" y="18" text-anchor="middle" font-size="3.5" font-weight="bold" fill="white" font-family="Arial, sans-serif">DCB</text>

  <!-- Center spindle -->
  <circle cx="16" cy="16" r="1.5" fill="#1a1a24"/>
  <circle cx="16" cy="16" r="0.8" fill="#5db8a8"/>

  <!-- Tonearm -->
  <line class="vinyl-disc" x1="23" y1="6" x2="18" y2="13" stroke="#5db8a8" stroke-width="1.2" stroke-linecap="round"/>
  <circle class="vinyl-disc" cx="23" cy="6" r="1.8" fill="none" stroke="#5db8a8" stroke-width="0.9"/>
</svg>
